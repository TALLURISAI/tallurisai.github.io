<!DOCTYPE html>
<html>
<head>
<title>Assets Files</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
}

h2 {
    text-align: center;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

a {
    color: #0066cc;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}
</style>

</head>

<body>

<h2>Files Available in Assets</h2>

<ul id="fileList">
    <li>Loading files...</li>
</ul>


<script>

const username = "tallurisai";
const repo = "tallurisai.github.io";
const folderPath = "assets";


fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`)
.then(response => response.json())
.then(files => {

    const list = document.getElementById("fileList");
    list.innerHTML = "";

    files.forEach(file => {

        if (file.type === "file") {

            const li = document.createElement("li");

            li.innerHTML = `
                <a href="${file.download_url}" target="_blank">
                    ${file.name}
                </a>
            `;

            list.appendChild(li);
        }

    });

    if(list.innerHTML === "") {
        list.innerHTML = "<li>No files found in assets folder.</li>";
    }

})
.catch(error => {

    document.getElementById("fileList").innerHTML =
    "<li>Unable to load files from assets folder.</li>";

});

</script>

</body>
</html>
